name: smartschools
description: Smart Schools — All-in-one school management platform
publish_to: 'none'
version: 1.0.0+16

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP & Storage
  dio: ^5.4.3
  shared_preferences: ^2.2.3

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3

  # Payment / External links
  url_launcher: ^6.3.0

  # PDF viewer
  syncfusion_flutter_pdfviewer: ^27.1.48
  path_provider: ^2.1.3

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2FA876"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
